<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subway Ultra Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 Subway Ultra Pro</h1>

<div id="hud">
  <span id="score">Score: 0</span>
  <span id="coins">Coins: 0</span>
  <span id="highScore">High: 0</span>
</div>

<div id="game">
  <img id="player" src="assets/player.png">
</div>

<button onclick="startGame()">▶ Start</button>

<audio id="bgMusic" src="assets/music.mp3" loop></audio>
<audio id="jumpSound" src="assets/jump.wav"></audio>

<script src="game.js"></script>
</body>
</html>
